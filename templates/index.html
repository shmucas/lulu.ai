<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lulu.ai</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <h1>lulu.ai</h1>
    <span id="status-badge">READY</span>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <textarea
      id="message-input"
      placeholder="Message lulu..."
      rows="1"
      autofocus
    ></textarea>
    <button id="mic-btn" title="Record voice">&#127908;</button>
    <button id="send-btn" title="Send (Enter)">&#10148;</button>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
